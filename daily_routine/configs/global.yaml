# データ保存ルート（リポジトリルートからの相対パスで解決される）
data_root: outputs

# APIキー（環境変数 DAILY_ROUTINE_API_KEY_{NAME} でオーバーライド可能）
api_keys:
  openai: ""
  google_ai: ""
  runway: ""
  suno: ""

# Visual Core 設定
visual:
  provider: "runway"
  runway:
    video_model: "gen4_turbo"
    image_model: "gen4_image_turbo"
    gcs_bucket: "daily-routine-weekly-dev"

# デフォルトのプロジェクト設定
defaults:
  output_fps: 30
  output_duration_range: [30, 60]

# ロギング
logging:
  level: INFO
